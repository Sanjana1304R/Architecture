<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>BAUEN | Architecture &amp; Interior Portfolio</title>
    <meta name="description" content="Bauen Architecture — premium residential and commercial architectural design.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=Didact+Gothic&display=swap">

    <link rel="stylesheet" href="css/plugins.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="slider-page-body">

    <div id="preloader"></div>

    <div class="progress-wrap cursor-pointer">
        <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
            <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
        </svg>
    </div>

    <header class="bauen-header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-6 col-md-4">
                    <a href="index.html" class="logo-text">Bauen</a>
                </div>
                <div class="col-md-4 d-none d-md-block text-center">
                    <nav class="bauen-nav">
                        <ul class="main-menu-list">
                            <li><a href="index.html" class="active">Home</a></li>
                            <li><a href="about.html">About</a></li>
                            <li><a href="projects.html">Projects</a></li>
                            <li><a href="contact.html">Contact</a></li>
                        </ul>
                    </nav>
                </div>
                <div class="col-6 col-md-4 text-end">
                    <span class="header-phone">+1 203-123-0606</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-hero-viewport">
        <div class="antigravity-slider-container" id="renovationSlider">

            <div class="image-layer before-layer" id="beforeLayer">
                <!-- Base photo with Ken Burns zoom -->
                <img src="img/before_empty_land.jpg" alt="Empty Plot Before Construction" class="before-photo">
                <!-- Cold blue cinematic tint overlay -->
                <div class="before-tint"></div>
                <!-- Radial vignette -->
                <div class="before-vignette"></div>
                <!-- Film grain noise -->
                <div class="before-grain"></div>
                <!-- Horizontal light scanner sweep -->
                <div class="before-scanner"></div>
                <!-- Animated dust particles -->
                <div class="before-particles">
                    <span class="dust-p" style="left:8%;animation-delay:0s;animation-duration:8s"></span>
                    <span class="dust-p" style="left:19%;animation-delay:1.2s;animation-duration:11s"></span>
                    <span class="dust-p" style="left:33%;animation-delay:2.4s;animation-duration:9s"></span>
                    <span class="dust-p" style="left:47%;animation-delay:0.7s;animation-duration:13s"></span>
                    <span class="dust-p" style="left:61%;animation-delay:3.1s;animation-duration:7s"></span>
                    <span class="dust-p" style="left:74%;animation-delay:1.8s;animation-duration:10s"></span>
                    <span class="dust-p" style="left:88%;animation-delay:0.3s;animation-duration:12s"></span>
                    <span class="dust-p" style="left:55%;animation-delay:4.5s;animation-duration:8.5s"></span>
                    <span class="dust-p" style="left:25%;animation-delay:5s;animation-duration:14s"></span>
                    <span class="dust-p" style="left:92%;animation-delay:2s;animation-duration:9.5s"></span>
                </div>
                <!-- Cinematic badge -->
                <div class="before-cinema-badge">
                    <span class="badge-dot"></span>
                    <span class="badge-label">Before Construction</span>
                </div>
            </div>

            <div class="image-layer luxury-layer" id="plainLayer">
                <!-- Base photo with reverse Ken Burns zoom -->
                <img src="img/house.jpg" alt="Luxury Architectural Transformation Render" class="luxury-photo">
                <!-- Warm golden cinematic tint -->
                <div class="luxury-tint"></div>
                <!-- Soft warm vignette -->
                <div class="luxury-vignette"></div>
                <!-- Luxury badge -->
                <div class="luxury-cinema-badge">
                    <span class="luxury-badge-dot"></span>
                    <span class="luxury-badge-label">Luxury Render</span>
                </div>
            </div>

            <div class="hero-caption-box">
                <div class="subtitle-tag animate-on-load animate-delay-1">Innovation Concept</div>
                <h1 class="hero-title-text animate-on-load animate-delay-2">Modern Luxury<br>Residence</h1>
            </div>

            <div class="slider-handle" id="sliderHandle">
                <div class="handle-line"></div>
                <div class="handle-button">
                    <span class="arrow-icon">&#8592;</span>
                    <span class="arrow-icon">&#8594;</span>
                </div>
                <div class="handle-line"></div>
            </div>

        </div>
    </main>

    <footer class="bauen-footer-bottom">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-12 text-center text-md-start">
                    <p class="copyright-text">&copy; 2026 <a href="#">Bauen</a>. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/custom.js"></script>
</body>

</html>
